#textdomain wesnoth-War_of_Legends

[unit_type]
    id=Skull Barrager
    name= _ "Skull Barrager"
    race=undead
    image="units/undead-skeletal/skullbarrager/skullbarrager.png"
    profile=portraits/undead/bone-shooter.webp
    hitpoints=49
    movement_type=undeadfoot
    movement=5
    experience=98
    level=3
    alignment=chaotic
    advances_to=Grave Sentinel
    cost=45
    description= _ "A Skull Slinger fights from instinct; a Skull Barrager fights from habit ground into its bones across decades of undeath. Its throws are not frantic but measured — a rapid, precisely spaced volley that lets no formation advance without cost. The dry desert preserves them well. There is nothing to rot, nothing to weaken — only the patient accumulation of lethal repetition."
    usage=archer
    die_sound=skeleton-big-die.ogg

    [abilities]
        {ABILITY_SUBMERGE}
    [/abilities]

    [resistance]
        blade=60
        pierce=40
        impact=120
    [/resistance]

    [attack]
        name=fist
        description= _ "fist"
        icon=attacks/fist-skeletal.png
        type=impact
        range=melee
        damage=6
        number=2
    [/attack]

    [attack]
        name=skull
        description= _ "skull"
        icon=attacks/rock_thrown.png
        type=impact
        range=ranged
        damage=8
        number=5
    [/attack]

    [attack]
        name=barrage
        description= _ "barrage"
        icon=attacks/rock_thrown.png
        type=impact
        range=ranged
        damage=15
        number=2
        [specials]
            {WEAPON_SPECIAL_STUN}
            {WEAPON_SPECIAL_ATTACK_ONLY}
        [/specials]
    [/attack]

    {DEFENSE_ANIM "units/undead-skeletal/skullslinger/skullslinger-defend.png" "units/undead-skeletal/skullslinger/skullslinger.png" {SOUND_LIST:SKELETON_BIG_HIT}}

    [attack_anim]
        [filter_attack]
            name=fist
        [/filter_attack]

        {SOUND:HIT_AND_MISS fist.ogg {SOUND_LIST:MISS} -100}

        start_time=-200

        [frame]
            image="units/undead-skeletal/skullslinger/skullslinger.png"
            duration=100
        [/frame]
        [frame]
            image="units/undead-skeletal/skullslinger/skullslinger-attack-2.png"
            duration=100
        [/frame]
        [frame]
            image="units/undead-skeletal/skullslinger/skullslinger.png"
            duration=100
        [/frame]
    [/attack_anim]

    [attack_anim]
        [filter_attack]
            name=skull
        [/filter_attack]

        offset=0

        [if]
            hits=yes
            {MISSILE_FRAME_STONE_HIT 5 -6}
            [frame]
                sound=sling.ogg
            [/frame]
        [/if]
        [else]
            hits=no
            {MISSILE_FRAME_STONE_MISS 5 -6}
            [frame]
                sound=sling-miss.ogg
            [/frame]
        [/else]

        start_time=-400

        [frame]
            image="units/undead-skeletal/skullslinger/skullslinger.png"
            duration=100
        [/frame]
        [frame]
            image="units/undead-skeletal/skullslinger/skullslinger-attack-[2,3].png:[200,100]"
        [/frame]
        [frame]
            image="units/undead-skeletal/skullslinger/skullslinger.png"
            duration=100
        [/frame]
    [/attack_anim]
[/unit_type]
