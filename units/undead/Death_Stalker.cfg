#textdomain wesnoth-War_of_Legends

[unit_type]
    id=Death Stalker
    name= _ "Death Stalker"
    race=undead
    image="units/undead-skeletal/death-stalker.png"
    profile=portraits/undead/banebow.webp
    hitpoints=54
    movement_type=undeadfoot
    movement=6
    experience=150
    level=3
    alignment=chaotic
    advances_to=null
    {AMLA_DEFAULT}
    cost=54
    description= _ "The most feared of undead archers, these ancient hunters have haunted the wastelands so long that no memory of their former lives remains. They move without thought or mercy, guided only by their master's will and an instinct sharpened by centuries of death. Their soul-arrows are dreaded above all else — for what the body survives, the spirit may not."
    usage=archer
    die_sound=skeleton-big-die.ogg

    [abilities]
        {ABILITY_SUBMERGE}
    [/abilities]
    [resistance]
        blade=60
        pierce=40
        impact=120
    [/resistance]
    [attack]
        name=dagger
        description=_"bone dagger"
        icon=attacks/dagger-undead.png
        type=impact
        range=melee
        damage=5
        number=3
    [/attack]
    [attack]
        name=bow
        description=_"bow"
        icon=attacks/bow-orcish.png
        type=pierce
        range=ranged
        damage=10
        number=4
		defense_weight=2.0
    [/attack]
    [attack]
        name=bow
        description=_"bow"
        icon=attacks/bow-orcish.png
        type=pierce
        range=ranged
        damage=18
        number=2
		[specials]
			{WEAPON_SPECIAL_MARKSMAN}
            {WEAPON_SPECIAL_ATTACK_ONLY}
		[/specials]
		attack_weight=1.3
    [/attack]
    {DEFENSE_ANIM "units/undead-skeletal/death-stalker-defend.png" "units/undead-skeletal/death-stalker.png" {SOUND_LIST:SKELETON_BIG_HIT} }
    [attack_anim]
        [filter_attack]
            name=bow
        [/filter_attack]
        missile_start_time=-150
        [missile_frame]
            duration=150
            image="projectiles/bone-n.png"
            image_diagonal="projectiles/bone-ne.png"
        [/missile_frame]
        start_time=-445
        [frame]
            image="units/undead-skeletal/death-stalker-ranged.png:65"
        [/frame]
        [frame]
            image="units/undead-skeletal/death-stalker-ranged[1~4].png:[75*2,100,130]"
        [/frame]
        {SOUND:HIT_AND_MISS bow.ogg bow-miss.ogg -380}
        [frame]
            image="units/undead-skeletal/death-stalker-ranged5.png:65"
        [/frame]
    [/attack_anim]
