    #      [/frame]
    #      [frame]
    #          image="units/undead-skeletal/death-stalker-ranged[1~4].png:[75*2,100,130]"
    #      [/frame]
    #      {SOUND:HIT_AND_MISS bow.ogg bow-miss.ogg -380}
    #      [frame]
    #          image="units/undead-skeletal/death-stalker-ranged5.png:65"
    #      [/frame]
    #      attack_sound_start_time=-100
    #      [attack_sound_frame]
    #          sound=wail-sml.wav
    #      [/attack_sound_frame]
    #  [/attack_anim]
    [attack_anim]
        [filter_attack]
            name=dagger
        [/filter_attack]
        start_time=-275

        [frame]
            image="units/undead-skeletal/death-stalker-defend.png:50"
        [/frame]
        [frame]
            image="units/undead-skeletal/death-stalker-attack.png:100"
        [/frame]
        {SOUND:HIT_AND_MISS club.ogg {SOUND_LIST:MISS} -125}
        [frame]
            image="units/undead-skeletal/death-stalker-defend.png:50"
        [/frame]
    [/attack_anim]
[/unit_type]
