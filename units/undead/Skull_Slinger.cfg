#textdomain wesnoth-War_of_Legends

[unit_type]
    id=Skull Slinger
    name= _ "Skull Slinger"
    race=undead
    image="units/undead-skeletal/skullslinger/skullslinger.png"
    profile=portraits/undead/bone-shooter.webp
    hitpoints=40
    movement_type=undeadfoot
    movement=5
    experience=62
    level=2
    alignment=chaotic
    advances_to=Skull Barrager
    cost=27
    description= _ "Skull Slingers do not forge weapons — they scavenge them from the dead. A skull hurled by skeletal arms strikes harder than it has any right to, and these undead never want for ammunition. Between battles they lie dormant beneath the dunes, indistinguishable from buried rubble, waiting in perfect silence for the tremor of boots on sand to drag them back into purpose."
    usage=archer
    die_sound=skeleton-big-die.ogg

    [abilities]
        {ABILITY_SUBMERGE}
    [/abilities]

    [resistance]
        blade=60
        pierce=40
        impact=120
    [/resistance]

    [attack]
        name=fist
        description= _ "fist"
        icon=attacks/fist-skeletal.png
        type=impact
        range=melee
        damage=5
        number=2
    [/attack]

    [attack]
        name=skull
        description= _ "skull"
        icon=attacks/rock_thrown.png
        type=impact
        range=ranged
        damage=7
        number=4
    [/attack]

    [attack]
        name=barrage
        description= _ "barrage"
        icon=attacks/rock_thrown.png
        type=impact
        range=ranged
        damage=11
        number=2
        [specials]
            {WEAPON_SPECIAL_STUN}
            {WEAPON_SPECIAL_ATTACK_ONLY}
        [/specials]
    [/attack]

    {DEFENSE_ANIM "units/undead-skeletal/skullslinger/skullslinger-defend.png" "units/undead-skeletal/skullslinger/skullslinger.png" {SOUND_LIST:SKELETON_BIG_HIT}}

    [attack_anim]
        [filter_attack]
            name=fist
        [/filter_attack]

        {SOUND:HIT_AND_MISS fist.ogg {SOUND_LIST:MISS} -100}

        start_time=-250

        [frame]
            image="units/undead-skeletal/skullslinger/skullslinger.png"
            duration=50
        [/frame]
        [frame]
            image="units/undead-skeletal/skullslinger/skullslinger-attack-[1,2].png"
            duration=250
        [/frame]
        [frame]
            image="units/undead-skeletal/skullslinger/skullslinger.png"
            duration=50
        [/frame]
    [/attack_anim]

    [attack_anim]
        [filter_attack]
            name=skull
        [/filter_attack]

        offset=0

        [if]
            hits=yes
            {MISSILE_FRAME_STONE_HIT 5 -6}
            [frame]
                sound=sling.ogg
            [/frame]
        [/if]
        [else]
            hits=no
            {MISSILE_FRAME_STONE_MISS 5 -6}
            [frame]
                sound=sling-miss.ogg
            [/frame]
        [/else]

        start_time=-500

        [frame]
            image="units/undead-skeletal/skullslinger/skullslinger.png"
            duration=100
        [/frame]
        [frame]
            image="units/undead-skeletal/skullslinger/skullslinger-attack-[1,2,3,4].png:150"
        [/frame]
        [frame]
            image="units/undead-skeletal/skullslinger/skullslinger.png"
            duration=100
        [/frame]
    [/attack_anim]
[/unit_type]
