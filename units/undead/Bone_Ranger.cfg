#textdomain wesnoth-War_of_Legends

[unit_type]
    id=Bone Ranger
    name= _ "Bone Ranger"
    race=undead
    image="units/undead-skeletal/bone-ranger.png"
    profile=portraits/undead/bone-shooter.webp
    hitpoints=41
    movement_type=undeadfoot
    movement=5
    experience=68
    level=2
    alignment=chaotic
    advances_to=Death Stalker

    cost=30
    description= _ "Once skilled hunters and rangers in life, these skeletal remnants have been raised by dark sorcery and bound to an oath never spoken in life. Driven by a cold, unrelenting hunger for vengeance, they stalk their quarry across marshland and ruin — drawing back fleshless fingers upon a bowstring and loosing arrows that carry the chill of the grave."
    usage=archer
    die_sound=skeleton-big-die.ogg

    [abilities]
        {ABILITY_SUBMERGE}
    [/abilities]
    [resistance]
        blade=60
        pierce=40
        impact=120
    [/resistance]
    [attack]
        name=dagger
        description=_"bone dagger"
        icon=attacks/dagger-undead.png
        type=impact
        range=melee
        damage=4
        number=3
    [/attack]
    [attack]
        name=bow
        description=_"bow"
        icon=attacks/bow-orcish.png
        type=pierce
        range=ranged
        damage=7
        number=4
        defense_weight=2.0
    [/attack]
    [attack]
        name=bow
        description=_"bow"
        icon=attacks/bow-orcish.png
        type=pierce
        range=ranged
        damage=14
        number=2
        [specials]
			{WEAPON_SPECIAL_MARKSMAN}
            {WEAPON_SPECIAL_ATTACK_ONLY}
		[/specials]
        attack_weight=1.3
    [/attack]
    {DEFENSE_ANIM "units/undead-skeletal/bone-ranger-defend.png" "units/undead-skeletal/bone-ranger.png" {SOUND_LIST:SKELETON_BIG_HIT} }
    [death]
        start_time=0
        [frame]
            image="units/undead-skeletal/bone-ranger-die-[1,2].png:200"
        [/frame]
    [/death]
    [attack_anim]
        [filter_attack]
            name=bow
        [/filter_attack]
        missile_start_time=-150
        [missile_frame]
            duration=150
            image="projectiles/bone-n.png"
            image_diagonal="projectiles/bone-ne.png"
        [/missile_frame]
        start_time=-445
        [frame]
            image="units/undead-skeletal/bone-ranger.png:65"
        [/frame]
        [frame]
            image="units/undead-skeletal/bone-ranger-ranged-1.png:75,units/undead-skeletal/bone-ranger.png:75,units/undead-skeletal/bone-ranger-ranged-1.png:100,units/undead-skeletal/bone-ranger-ranged-2.png:130"
        [/frame]
        {SOUND:HIT_AND_MISS bow.ogg bow-miss.ogg -380}
        [frame]
            image="units/undead-skeletal/bone-ranger.png:65"
        [/frame]
    [/attack_anim]
    [attack_anim]
        [filter_attack]
            name=dagger
        [/filter_attack]
        start_time=-275
        [frame]
            image="units/undead-skeletal/bone-ranger-defend.png:50"
        [/frame]
        [frame]
            image="units/undead-skeletal/bone-ranger-melee.png:100"
        [/frame]
        {SOUND:HIT_AND_MISS dagger-swish.wav {SOUND_LIST:MISS} -125}
        [frame]
            image="units/undead-skeletal/bone-ranger-defend.png:50"
        [/frame]
    [/attack_anim]
[/unit_type]
